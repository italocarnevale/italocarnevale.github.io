experiences:
  title: Esperienza lavorativa
  info:
  - role: Enterprise Architect / Advisor
    time: 2015 - Attuale
    company: Imola Informatica S.p.A., Imola (BO)
    details: |
      Revisione e definizione dei processi di Enterprise Architecture e della mappa applicativa
      dell'intero sistema informativo (CMDB, tipicamente centinaia di applicazioni negli istituti
      bancari seguiti). Supporto ai processi di IT Governance e IT Risk. Supporto alla definizione
      dell'architettura target a microservizi. Messa in produzione di un sistema antifrode basato su
      Machine Learning, con introduzione e industrializzazione della metodologia MLOps. Progettazione
      e revisione di architetture per applicazioni Machine Learning e Intelligenza Artificiale, incluse
      iniziative di introduzione dell'AI in azienda su più ambiti. Assessment architetturali;
      coordinamento di gruppi di lavoro multi-progetto presso clienti (da singolo consulente a ~15
      persone). Supporto ai processi interni aziendali (HR, controllo di gestione, fatturazione e
      consuntivazione) e partecipazione a tavoli di governance strategica interna.

      Clienti principali: Banca Mediolanum (dal 2013), IOR - Istituto per le Opere di Religione
      (2012-14), Edenred Italia (dal 2020), UnipolSai Assicurazioni (dal 2019), Banca Generali (dal
      2023), Banca Popolare di Sondrio (dal 2012), Credit Agricole Group Solutions (dal 2019), Banco
      BPM, Creval, BPER Banca.

      Tecnologie: Java/J2EE, Spring 4.x, SpringBoot, Swagger/OpenAPI, Oracle WebLogic, Oracle SOA
      Suite, Oracle Service Bus, Oracle Database, IBM MQ, Splunk, Elasticsearch, Docker/Kubernetes,
      Terraform, Ansible.
        - Sistema antifrode basato su Machine Learning, con industrializzazione della metodologia MLOps
        - Coordinamento di gruppi di lavoro multi-progetto (da singolo consulente a ~15 persone)
        - Partecipazione a tavoli di governance strategica interna
  - role: Enterprise Architect
    time: 2014 - 2015
    company: Imola Informatica S.p.A., Imola (BO)
    details: |
      Progettazione e realizzazione di componenti architetturali riusabili. Progettazione e
      realizzazione di strumenti e plugin Maven per la build e il deploy di componenti applicative
      proprietarie (Oracle Service Bus, Oracle SOA Suite). Progettazione e realizzazione di plugin
      SonarQube per la validazione delle linee guida. Supporto alla predisposizione dell'infrastruttura
      di Continuous Integration; definizione Linee Guida Architetturali e Manuale di Sviluppo.

      Tecnologie: Java/J2EE, Spring 3.x, Oracle WebLogic, Oracle SOA Suite, Oracle Service Bus, Oracle
      Database, IBM MQ, Splunk.
  - role: Architetto IT
    time: 2013 - 2014
    company: Imola Informatica S.p.A., Imola (BO)
    details: |
      Analisi e progettazione di soluzioni software in ambito bancario. Realizzazione di prototipi e
      reference implementation. Supporto alla definizione e all'implementazione del processo di
      rendicontazione dei movimenti e allineamento del saldo in modalità "near real-time".

      Tecnologie: Java/J2EE, Oracle WebLogic, Oracle SOA Suite, Oracle Database, IBM MQ.
  - role: Architetto IT
    time: 2012 - 2013
    company: Imola Informatica S.p.A., Imola (BO)
    details: |
      Progettazione e realizzazione di applicazioni in ambito bancario. Definizione toolchain per la
      gestione del ciclo di vita del software. Automatizzazione infrastruttura.

      Tecnologie: Java/J2EE, Groovy, Apache Servicemix, Apache Tomcat, Oracle WebLogic, Oracle SOA
      Suite, Oracle Database.
  - role: Architetto / Sviluppatore
    time: 2011 - 2012
    company: Imola Informatica S.p.A., Imola (BO)
    details: |
      Progettazione e realizzazione di una soluzione di Enterprise Architecture basata su tecnologie
      Semantiche per la descrizione del sistema informativo. Definizione linee guida di sviluppo
      BPEL/BPM su Oracle SOA Suite.

      Tecnologie: Java/J2EE, PHP, Apache ActiveMQ, Mediawiki, SPARQL, Semantic Web.
  - role: Architetto / Sviluppatore
    time: 2010 - 2011
    company: Gruppo Euris S.p.A., Trieste (TS)
    details: |
      Sviluppo e manutenzione di applicazioni Java/J2EE in ambito assicurativo. Assistenza alla
      produzione; integrazioni e modifiche all'interfaccia utente degli applicativi di preventivazione.
      Integrazione di flussi dati; realizzazione di stored procedure PL/SQL su database Oracle.

      Tecnologie: Java/J2EE, Oracle Database, PL/SQL, Vitria Workflow Engine.
  - role: Architetto / Sviluppatore
    time: 2007 - 2010
    company: eNia s.r.l, Isernia (IS)
    details: |
      Progettazione e realizzazione di applicazioni Java/J2EE in ambito finanziario. Realizzazione di
      interfacce grafiche web based. Progettazione e realizzazione di piattaforme di integrazione e
      schedulazione.

      Tecnologie: Java/J2EE, Apache Tomcat, framework e middleware proprietari.
  - role: Sviluppatore (Stage/Tirocinio)
    time: 2007
    company: IG Technology S.p.A., Roma
    details: |
      Realizzazione di un applicativo software web based per la gestione dei servizi interni.

      Tecnologie: Java/J2EE, JBoss, MySQL, Hibernate, Versant Object Database.


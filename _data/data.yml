career-profile:
  title: Profilo
  summary: |
    Enterprise Architect con oltre 15 anni di esperienza, principalmente nei settori Banking e Insurance.
    Ho partecipato a iniziative di supporto all'evoluzione architetturale e alla governance IT attraverso
    la mappatura applicativa, la definizione di reference e target architecture e l'introduzione di processi
    orientati alla qualità e alla mitigazione dei rischi tecnologici.

    Ho competenze consolidate su architetture a microservizi, integrazione enterprise, CI/CD e osservabilità/
    monitoraggio end-to-end. Ho messo in produzione un sistema antifrode basato su Machine Learning,
    introducendo e industrializzando la metodologia MLOps, e ho partecipato a iniziative di introduzione
    dell'IA Generativa nel ciclo di vita del software e in altri ambiti aziendali, sempre con un taglio di
    industrializzazione e definizione di architetture di riferimento.

    Coordino gruppi di lavoro tecnico multi-progetto, da singolo consulente fino a circa 15 persone, e
    partecipo a tavoli di governance strategica interna della mia azienda.

